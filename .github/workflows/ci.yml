name: CI — Notification Bridge

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-aiohttp aiohttp

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --timeout=30 --asyncio-mode=auto

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-aiohttp aiohttp

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ -v --timeout=30 --asyncio-mode=auto

  docker-build:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t hermes-notification-bridge:ci -f docker/Dockerfile .

      - name: Verify image
        run: |
          docker run --rm hermes-notification-bridge:ci python -c "from bridge.server import create_app; print('OK')"
