# Notification Bridge — Test Deployment
#
# Includes:
#   - notification-bridge (test config)
#   - redroid Android 13 emulator (for E2E tests)
#
# Usage:
#   docker compose -f docker/docker-compose.test.yml up -d
#   adb connect localhost:5555
#   curl http://localhost:8655/health

services:
  notification-bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hermes-notification-bridge-test
    ports:
      - "8655:8655"
    volumes:
      - bridge-test-data:/app/data
    environment:
      - BRIDGE_PORT=8655
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_AUTH_KEY=test-bridge-key-2026
      - BRIDGE_DB_PATH=/app/data/test-messages.db
      - BRIDGE_HEARTBEAT_INTERVAL=5
      - BRIDGE_MAX_MESSAGES=100
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8655/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  redroid:
    image: redroid/redroid:13.0.0-latest
    container_name: hermes-redroid-test
    ports:
      - "5556:5555"
    privileged: true
    devices:
      - /dev/binder0:/dev/binder0
      - /dev/ashmem:/dev/ashmem
    volumes:
      - redroid-data:/data
    environment:
      - REDROID_OPTS=androidboot.hardware=redroid androidboot.redroid_gpu_mode=guest
    command: >
      androidboot.redroid_height=1920
      androidboot.redroid_width=1080
      androidboot.redroid_dpi=480
      androidboot.redroid_net_ndns=8.8.8.8

volumes:
  bridge-test-data:
  redroid-data:
