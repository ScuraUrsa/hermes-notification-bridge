# Notification Bridge — Production Deployment
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   curl http://localhost:8655/health

services:
  notification-bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hermes-notification-bridge
    restart: unless-stopped
    ports:
      - "8655:8655"
    volumes:
      - bridge-data:/app/data
    environment:
      - BRIDGE_PORT=8655
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_AUTH_KEY=${BRIDGE_AUTH_KEY:-hermes-bridge-dev-key}
      - BRIDGE_DB_PATH=/app/data/messages.db
      - BRIDGE_HEARTBEAT_INTERVAL=${BRIDGE_HEARTBEAT_INTERVAL:-30}
      - BRIDGE_MAX_MESSAGES=${BRIDGE_MAX_MESSAGES:-1000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8655/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bridge-data:
